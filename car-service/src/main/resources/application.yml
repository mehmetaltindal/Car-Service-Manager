server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: car-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/car_service?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:car_user}
    password: ${SPRING_DATASOURCE_PASSWORD:car_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info
